<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPrompt Lab - 리얼 가상 머신 작업실</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .monaco-editor, .monaco-editor .overflow-guard { border-radius: 0.5rem; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col font-sans antialiased">

  <header class="bg-white shadow-sm border-b border-gray-200 h-16 shrink-0 sticky top-0 z-50">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-blue-600 text-white p-2 rounded-lg shadow-md">
          <i class="fa-solid fa-server text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-900 tracking-tight">DevPrompt Lab <span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded ml-2">Cloud IDE v10.0</span></h1>
          <p class="text-xs text-gray-500">리얼타임 고성능 클라우드 컴파일 인프라 활성화</p>
        </div>
      </div>
      <div id="userInfo" class="hidden flex items-center space-x-4">
        <span id="userDisplayEmail" class="text-sm font-medium text-gray-600 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200"></span>
        <button id="btnLogout" class="text-sm text-red-600 font-semibold flex items-center space-x-1"><i class="fa-solid fa-right-from-bracket"></i><span>로그아웃</span></button>
      </div>
    </div>
  </header>

  <section id="authSection" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 border border-gray-100 my-auto">
    <div class="text-center mb-8">
      <h2 id="authTitle" class="text-2xl font-bold text-gray-900">반갑습니다 👋</h2>
      <p class="text-sm text-gray-500 mt-2">서비스를 시작하려면 로그인하세요.</p>
    </div>
    <form id="authForm" class="space-y-4">
      <input type="email" id="authEmail" required class="w-full px-4 py-2.5 border rounded-lg" placeholder="이메일">
      <input type="password" id="authPassword" required class="w-full px-4 py-2.5 border rounded-lg" placeholder="비밀번호">
      <button type="submit" id="btnAuthSubmit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg">로그인</button>
    </form>
    <div class="text-center mt-4"><button id="btnToggleAuth" class="text-sm text-blue-600 underline">회원가입하기</button></div>
  </section>

  <main id="mainAppSection" class="hidden flex-grow w-full max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6 overflow-hidden">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-120px)] items-stretch">
      
      <div class="lg:col-span-5 flex flex-col space-y-4 min-h-0">
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col min-h-0 shrink-0">
          <div class="border-b border-gray-100 pb-2 mb-3 flex justify-between items-center">
            <h3 class="text-sm font-bold text-gray-900 flex items-center space-x-2"><i class="fa-solid fa-terminal text-blue-500"></i><span>클라우드 워크스페이스</span></h3>
            <select id="noteLang" class="border rounded px-2 py-1 text-xs font-bold bg-gray-50 outline-none">
              <option value="javascript">JavaScript (Node.js Engine)</option>
              <option value="python">Python 3 (Cloud VM)</option>
              <option value="c">C 언어 (GCC / Clang 컴파일러)</option>
              <option value="cpp">C++ (G++ 컴파일러)</option>
              <option value="html">HTML5 (Real Popup)</option>
            </select>
          </div>
          <div class="space-y-3">
            <input type="text" id="noteTitle" class="w-full border rounded-lg px-3 py-1.5 text-xs outline-none" placeholder="파일 제목 입력">
            <div id="editorContainer" class="w-full border rounded-lg h-44 overflow-hidden bg-gray-900">
              <div id="noteContent" class="w-full h-full"></div>
            </div>
            
            <div class="bg-gray-950 rounded-lg p-3 font-mono text-[11px] text-gray-300">
              <div class="flex items-center justify-between border-b border-gray-800 pb-1 mb-2">
                <span class="text-blue-400 font-bold"><i class="fa-solid fa-server text-[10px]"></i> CLOUD CORE LIVE OUTPUT</span>
                <div class="flex space-x-2">
                  <button onclick="runSimulation()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-2 py-0.5 rounded text-[10px] transition">컴파일 및 실행</button>
                  <button onclick="clearConsole()" class="bg-gray-800 hover:bg-gray-700 px-2 py-0.5 rounded text-[10px] transition">비우기</button>
                </div>
              </div>
              <div id="consoleOutput" class="h-24 overflow-y-auto space-y-1 text-green-400 leading-tight font-mono">
                <span class="text-gray-500">// 클라우드 인프라 연결 완료. 코드를 작성하고 실행을 눌러보세요.</span>
              </div>
            </div>
            <button id="btnSaveNote" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold shadow-sm">기록 보관소에 저장</button>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col flex-grow min-h-0">
          <div class="border-b pb-2 mb-2 flex justify-between items-center">
            <span class="text-xs font-bold text-gray-500"><i class="fa-solid fa-box-archive"></i> 보관된 리스트</span>
            <span id="noteCount" class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-full">0개</span>
          </div>
          <div id="noteList" class="flex-grow overflow-y-auto space-y-2 pr-1"></div>
        </div>
      </div>

      <div class="lg:col-span-7 flex flex-col bg-white border border-gray-200 shadow-sm rounded-xl min-h-0">
        <div class="p-4 border-b bg-gray-50 rounded-t-xl flex justify-between items-center">
          <span class="text-sm font-bold text-gray-700"><i class="fa-solid fa-robot text-blue-600"></i> DevPrompt AI Reviewer</span>
          <button onclick="clearChat()" class="text-xs text-gray-400 hover:text-red-500 transition">초기화</button>
        </div>
        <div id="chatStream" class="flex-grow p-4 overflow-y-auto space-y-4 text-sm bg-gray-50/30">
          <div class="flex space-x-3 items-start">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg text-[10px] font-bold shrink-0">AI</div>
            <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100">
              클라우드 컴파일 인프라가 적용된 **v10.0** 시스템입니다. 이제 브라우저 과부하나 외부 라이브러리 차단 오류 없이 실제 기계어 단위의 고차원 컴파일 코딩이 정상 작동합니다.
            </div>
          </div>
        </div>
        <form id="chatForm" class="p-4 border-t bg-white flex space-x-2">
          <input type="text" id="chatQuestion" required class="flex-grow border rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AI에게 질문하거나 코드 리뷰를 요청하세요...">
          <button type="submit" id="btnChatSubmit" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold transition">전송</button>
        </form>
      </div>
    </div>
  </main>

  <audio id="globalAudioPlayer" class="hidden"></audio>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

  <script>
    // 1. 파이어베이스 설정 (기존 데이터 완벽 보존)
    const firebaseConfig = {
      apiKey: "AIzaSyDbrsr6g0X6vKujfqBcFY0h--Rn3y1nCEI",
      authDomain: "bin20703-edda7.firebaseapp.com",
      databaseURL: "https://bin20703-edda7-default-rtdb.firebaseio.com",
      projectId: "bin20703-edda7",
      storageBucket: "bin20703-edda7.firebasestorage.app",
      messagingSenderId: "242056223892",
      appId: "1:242056223892:web:885b9bf54aa60ce7732881"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_tPPZxFNsHwm5Rp8L-UMvUE_yojf4i96dTH-Ho6s3SNojNB31ye8SVmirP9uootOd/exec";

    let currentUser = null;
    let isSignUpMode = false;
    let editorInstance = null; 

    // 모나코 에디터 초기화 및 기본 언어 스크립트 가동
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
    require(['vs/editor/editor.main'], function() {
      editorInstance = monaco.editor.create(document.getElementById('noteContent'), {
        value: `console.log("Hello Node.js System!");`,
        language: "javascript",
        theme: "vs-dark",
        automaticLayout: true,
        fontSize: 12,
        minimap: { enabled: false }
      });
    });

    // 언어 토글 연동 맵핑 스위치
    document.getElementById('noteLang').addEventListener('change', (e) => {
      const lang = e.target.value;
      let monacoLang = "plaintext";
      if(lang === 'javascript') { monacoLang = 'javascript'; editorInstance.setValue('console.log("Hello Web Server!");'); }
      else if(lang === 'python') { monacoLang = 'python'; editorInstance.setValue('print("Hello Cloud Python!")\nfor i in range(5):\n    print(f"Index: {i}")'); }
      else if(lang === 'c') { monacoLang = 'c'; editorInstance.setValue('#include <stdio.h>\n\nint main() {\n    int sum = 0;\n    for(int i = 1; i <= 10; i++) {\n        sum += i;\n    }\n    printf("1부터 10까지 리얼 GCC 컴파일 합계: %d\\n", sum);\n    return 0;\n}'); }
      else if(lang === 'cpp') { monacoLang = 'cpp'; editorInstance.setValue('#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello Cloud G++ Compiler Engine!" << endl;\n    return 0;\n}'); }
      else if(lang === 'html') { monacoLang = 'html'; editorInstance.setValue('<!DOCTYPE html>\n<html>\n<body>\n  <h1>독립 샌드박스 팝업</h1>\n</body>\n</html>'); }
      monaco.editor.setModelLanguage(editorInstance.getModel(), monacoLang);
    });

    // =========================================================
    // 초경량 고성능 오픈 컴파일 API 어댑터 통합 코어
    // =========================================================
    async function runSimulation() {
      const code = editorInstance.getValue();
      const lang = document.getElementById('noteLang').value;
      const out = document.getElementById('consoleOutput');
      out.innerHTML = `<span class="text-yellow-400 font-bold">[원격 클라우드 커널에 컴파일 요청 중...]</span>`;

      if(lang === 'html') {
        const popup = window.open("", "_blank");
        if(!popup) { out.innerHTML = "팝업 차단 상태입니다."; return; }
        popup.document.write(code); popup.document.close();
        out.innerHTML = `<span>&gt; 독립된 HTML 세션 팝업이 전송되었습니다.</span>`;
        return;
      }

      // API 스펙 연동 규격 언어 변환 맵퍼
      let languageMap = {
        'javascript': { id: 63, name: 'javascript' },
        'python': { id: 71, name: 'python3' },
        'c': { id: 50, name: 'c' },
        'cpp': { id: 54, name: 'cpp' }
      };

      const selected = languageMap[lang];
      
      try {
        // 전 세계 오픈 컴파일 가상 백엔드 통신 트랙 실행
        const response = await fetch("https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=false&wait=true", {
          method: "POST",
          headers: {
            "x-rapidapi-host": "judge0-ce.p.rapidapi.com",
            "x-rapidapi-key": "4733362a2fmsh9bc6fbdbbd848ecp1a457ajsn2e76ca80bc1b", // 가상 글로벌 런타임 공유 인증 토큰
            "content-type": "application/json"
          },
          body: JSON.stringify({
            source_code: code,
            language_id: selected.id
          })
        });

        const result = await response.json();
        
        // 결과 출력 제어 핸들러 스캔
        if (result.stdout) {
          out.innerHTML = result.stdout.split('\n').filter(l => l).map(l => `<span>&gt; ${escapeHtml(l)}</span>`).join('<br>');
        } else if (result.compile_output) {
          out.innerHTML = `<span class="text-red-400 font-bold">[컴파일 문법 오류 발생]<br>${escapeHtml(result.compile_output)}</span>`;
        } else if (result.stderr) {
          out.innerHTML = `<span class="text-orange-400">[런타임 에러 발생]<br>${escapeHtml(result.stderr)}</span>`;
        } else {
          out.innerHTML = `<span class="text-gray-400">&gt; 프로그램 정상 종료 (출력값 없음, Code 0)</span>`;
        }
      } catch (err) {
        out.innerHTML = `<span class="text-red-500">네트워크 타임아웃 오류: ${escapeHtml(err.toString())}</span>`;
      }
    }

    function clearConsole() { document.getElementById('consoleOutput').innerHTML = '<span class="text-gray-500">// 터미널 로그 초기화됨</span>'; }
    function escapeHtml(t) { return t ? t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ""; }

    // Firebase 파트 유지 관리
    auth.onAuthStateChanged(user => {
      if(user) { currentUser = user; document.getElementById('authSection').classList.add('hidden'); document.getElementById('mainAppSection').classList.remove('hidden'); document.getElementById('userDisplayEmail').textContent = user.email; loadNotes(); }
      else { currentUser = null; document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainAppSection').classList.add('hidden'); }
    });
    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value; const pw = document.getElementById('authPassword').value;
      if(isSignUpMode) auth.createUserWithEmailAndPassword(email, pw).catch(err => alert(err.message));
      else auth.signInWithEmailAndPassword(email, pw).catch(err => alert(err.message));
    });
    document.getElementById('btnToggleAuth').addEventListener('click', () => { isSignUpMode = !isSignUpMode; document.getElementById('authTitle').textContent = isSignUpMode ? "회원가입" : "로그인"; });
    document.getElementById('btnLogout').addEventListener('click', () => auth.signOut());

    document.getElementById('btnSaveNote').addEventListener('click', () => {
      if(!currentUser) return;
      database.ref(`users/${currentUser.uid}/notes`).push({
        lang: document.getElementById('noteLang').value,
        title: document.getElementById('noteTitle').value || "무제 코드",
        content: editorInstance.getValue()
      }).then(() => alert('클라우드 아카이브 동기화 성공'));
    });

    function loadNotes() {
      database.ref(`users/${currentUser.uid}/notes`).on('value', snap => {
        const list = document.getElementById('noteList'); list.innerHTML = '';
        const data = snap.val(); if(!data) return;
        Object.keys(data).reverse().forEach(key => {
          const item = data[key]; const div = document.createElement('div');
          div.className = "p-2 bg-gray-50 border rounded text-xs flex justify-between items-center my-1";
          div.innerHTML = `<div><b>[${item.lang}]</b> ${escapeHtml(item.title)}</div><div class="flex space-x-1"><button onclick="deleteNote('${key}')" class="text-red-500">삭제</button><button onclick="bindToChat('${key}')" class="bg-blue-600 text-white px-2 py-0.5 rounded">AI 요청</button></div>`;
          list.appendChild(div);
        });
        document.getElementById('noteCount').textContent = `${Object.keys(data).length}개`;
      });
    }
    function deleteNote(key) { database.ref(`users/${currentUser.uid}/notes/${key}`).remove(); }
    function bindToChat(key) {
      database.ref(`users/${currentUser.uid}/notes/${key}`).once('value', snap => {
        const item = snap.val();
        document.getElementById('chatQuestion').value = `[클라우드 코드 검사] 언어: ${item.lang}\n\n${item.content}`;
        document.getElementById('chatQuestion').focus();
      });
    }

    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault(); const q = document.getElementById('chatQuestion').value; if(!q) return;
      appendMsg('USER', q); document.getElementById('chatQuestion').value = '';
      try {
        const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'chat', question: q }) });
        const data = await res.json(); appendMsg('AI', data.answer);
      } catch(e) { appendMsg('ERR', e.toString()); }
    });
    function appendMsg(sender, text) {
      const div = document.createElement('div'); div.className = "p-2.5 bg-white rounded shadow-sm text-xs border my-1 whitespace-pre-wrap";
      div.innerHTML = `<b>${sender}:</b> ${escapeHtml(text)}`;
      document.getElementById('chatStream').appendChild(div);
      document.getElementById('chatStream').scrollTop = document.getElementById('chatStream').scrollHeight;
    }
    function clearChat() { document.getElementById('chatStream').innerHTML = ''; }
  </script>
</body>
</html>
